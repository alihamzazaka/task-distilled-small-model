# CI for the task-distilled small model project.
#
# What actually runs on every push / PR: the unit suite over the pure
# compute layers (schema validation, filtering, metrics, cost model) using
# only the core deps (pydantic / jsonschema / pyyaml). No teacher API calls,
# no torch/unsloth, no GPU — training and eval runs stay on the RTX 5080 box
# per the RUNBOOK.
#
# Honest status: written and validated locally; not yet executed on a GitHub
# runner (repo not pushed at time of writing).
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Core package + the dev extra (pytest); datagen/gpu extras are
      # deliberately skipped on CI.
      - name: Install package + pytest
        run: python -m pip install -e ".[dev]"

      - name: Unit tests (schema / filtering / metrics / cost model)
        run: pytest -q
